<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}"/>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
</head>
<body>
<header th:insert="bloks/header :: header"></header>
<div class="modal modal-sheet position-static d-block bg-body-secondary p-4 py-md-5" tabindex="-1" role="dialog"
     id="modalSignin">
    <div class="modal-dialog" role="document">
        <div class="modal-content rounded-4 shadow">
            <div class="modal-header p-5 pb-4 border-bottom-0">
                <h1 class="fw-bold mb-0 fs-2"><font style="vertical-align: inherit;"><font
                        style="vertical-align: inherit;">Подача Заявявки</font></font></h1>
            </div>

            <div class="modal-body p-5 pt-0">
                <form action="/reg" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control rounded-3" id="floatingFIO" name="floatingFIO"
                               placeholder="фамилия имя отчество">
                        <label for="floatingFIO"><font style="vertical-align: inherit;"><font
                                style="vertical-align: inherit;">ФИО</font></font></label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="tel" class="form-control rounded-3" id="floatingTelephone" name="floatingTelephone"
                               placeholder="999-999-9999" pattern="^((8|\+7)[\- ]?)?(\(?\d{3}\)?[\- ]?)?[\d\- ]{7,10}$" required>
                        <label for="floatingTelephone"><font style="vertical-align: inherit;"><font
                                style="vertical-align: inherit;">Телефон</font></font></label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="date" class="form-control rounded-3" id="floatingDateBirsd" name="floatingDateBirsd"
                               placeholder="Введите дату рождения">
                        <label for="floatingDateBirsd"><font style="vertical-align: inherit;"><font
                                style="vertical-align: inherit;">Дата рождения</font></font></label>
                    </div>
                    <div class="form-floating mb-3">

                        <select name="countries" class="form-control rounded-3">
                            <option value="бокс">Бокс</option>
                            <option value="кикбокс">Кикбокс</option>
                            <option value="карате">Карате</option>
                            <option value="тхэквондо">Тхэквондо</option>
                            <option value="самбо">Самбо</option>
                            <option value="Вольная борьба">Вольная борьба</option>
                        </select>
                        <label><font style="vertical-align: inherit;"><font
                                style="vertical-align: inherit;">Выберете секцию</font></font></label>
                    </div>
                    <button class="w-100 mb-2 btn btn-lg rounded-3 btn-primary" type="submit"><font
                            style="vertical-align: inherit;"><font style="vertical-align: inherit;">Подать заявку</font></font>
                    </button>

                </form>
            </div>
        </div>
    </div>
</div>
<footer th:insert="bloks/footer :: footer"></footer>
</body>
</html>
